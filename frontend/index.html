<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>AZ Turf Pro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🏇 AZ Turf Pro</h1>
        <p>Analyse intelligente des Quintés</p>
    </header>

    <section class="formulaire">

        <input id="numero" type="number" placeholder="N°">

        <input id="nom" type="text" placeholder="Nom">

        <input id="forme" type="number" min="0" max="10" placeholder="Forme">

        <input id="regularite" type="number" min="0" max="10" placeholder="Régularité">

        <input id="distance" type="number" min="0" max="10" placeholder="Distance">

        <input id="terrain" type="number" min="0" max="10" placeholder="Terrain">

        <input id="jockey" type="number" min="0" max="10" placeholder="Jockey">

        <input id="entraineur" type="number" min="0" max="10" placeholder="Entraîneur">

        <input id="valeur" type="number" min="0" max="10" placeholder="Valeur">

        <input id="corde" type="number" min="0" max="10" placeholder="Corde">

        <input id="cote" type="number" min="0" max="10" placeholder="Cote">

        <button onclick="ajouter()">
            ➕ Ajouter le cheval
        </button>

        <button onclick="envoyer()">
            🚀 Lancer l'analyse AZ
        </button>

    </section>

    <h2>Chevaux enregistrés</h2>

    <table>

        <thead>

            <tr>

                <th>N°</th>

                <th>Nom</th>

                <th>Forme</th>

                <th>Cote</th>

            </tr>

        </thead>

        <tbody id="liste">

        </tbody>

    </table>

    <h2>Résultat AZ</h2>

    <pre id="resultat"></pre>

    <script src="script.js"></script>

</body>

</html>
