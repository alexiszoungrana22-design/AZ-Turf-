<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZ Turf Pro</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>🏇 AZ Turf Pro</h1>
    <p>Analyse intelligente des courses Quinté+</p>

    <div class="card">

        <h2>Ajouter un cheval</h2>

        <input id="numero" type="number" placeholder="Numéro">

        <input id="nom" type="text" placeholder="Nom du cheval">

        <input id="cote" type="number" step="0.1" placeholder="Cote">

        <button onclick="ajouterCheval()">
            Ajouter
        </button>

    </div>

    <div class="card">

        <h2>Chevaux enregistrés</h2>

        <ul id="listeChevaux"></ul>

    </div>

    <button class="analyse" onclick="analyser()">
        🧠 Analyser le Quinté
    </button>

    <div class="card">

        <h2>Classement AZ</h2>

<table id="tableau">

    <thead>

        <tr>

            <th>Rang</th>
            <th>N°</th>
            <th>Cheval</th>
            <th>Indice AZ</th>

        </tr>

    </thead>

    <tbody id="classement">

    </tbody>

</table>

<h2>🎯 Ticket conseillé</h2>

<div id="ticket"></div>
<hr>

<h2>🏆 Paris recommandés</h2>

<div class="paris">

    <div class="carte">
        <h3>🎯 Quinté</h3>
        <p id="quinte"></p>
    </div>

    <div class="carte">
        <h3>🥇 Tiercé</h3>
        <p id="tierce"></p>
    </div>

    <div class="carte">
        <h3>🥈 Couplé Gagnant</h3>
        <p id="couple_gagnant"></p>
    </div>

    <div class="carte">
        <h3>🥉 Couplé Placé</h3>
        <p id="couple_place"></p>
    </div>

    <div class="carte">
        <h3>⭐ Confiance AZ</h3>
        <p id="confiance"></p>
    </div>

</div>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
